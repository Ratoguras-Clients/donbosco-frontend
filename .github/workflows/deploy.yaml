name: Deploy Next.js to VPS

on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/deploy/CNI-Koshi
            git pull origin main
            npm install
            npm run build
            pm2 start npm --name nextjs-app -- start 
